<div class="room-list-container">
    <div class="glass-section-header">🏰 Select Your Kingdom Quarters</div>
    <div class="room-selection-grid">
      <div 
        *ngFor="let room of rooms" 
        class="room-selection-card" 
        [class.selected]="selectedRoomId === room.name"
        (click)="selectRoom(room)">
        <div class="room-selector-dot"></div>
        <div class="room-details-row">
          <h3>{{ room.name }}</h3>
          <span class="price-pill">💰 {{ room.price }} Gold / Night</span>
        </div>
      </div>
    </div>
  </div>
