<div class="booking-form-box">
    <div class="glass-section-header">📅 Stay Configuration</div>
    
    <div class="form-inputs-row">
      <!-- Nights Counter -->
      <div class="counter-field">
        <label>Length of Stay (Nights)</label>
        <div class="counter-control">
          <button type="button" (click)="changeNights(-1)">-</button>
          <span class="counter-value">{{ nightsCount }}</span>
          <button type="button" (click)="changeNights(1)">+</button>
        </div>
      </div>
  
      <!-- Guests Counter -->
      <div class="counter-field">
        <label>Party Size (Adventurers)</label>
        <div class="counter-control">
          <button type="button" (click)="changeGuests(-1)">-</button>
          <span class="counter-value">{{ guestsCount }}</span>
          <button type="button" (click)="changeGuests(1)">+</button>
        </div>
      </div>
    </div>
  </div>
