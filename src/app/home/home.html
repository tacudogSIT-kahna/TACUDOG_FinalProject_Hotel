<div class="home-container">

  <!-- Section 1: Hotel Rooms Showcase Block -->
  <div class="showcase-block">
    <div class="glass-section-banner">{{ roomsHeader }}</div>
    
    <div class="inner-display-card">
      <img [src]="roomsImg" alt="Rooms Preview" class="showcase-img">
      <p class="showcase-text">{{ roomsDesc }}</p>
      
      <div class="action-wrapper">
        <button routerLink="/stay" class="showcase-btn">{{ roomsBtnText }}</button>
      </div>
    </div>
  </div>

  <!-- Section 2: Restaurant & Bar Showcase Block -->
  <div class="showcase-block">
    <div class="glass-section-banner">{{ diningHeader }}</div>
    
    <div class="inner-display-card">
      <img [src]="diningImg" alt="Dining Preview" class="showcase-img">
      <p class="showcase-text">{{ diningDesc }}</p>
      
      <div class="action-wrapper">
        <button class="showcase-btn">{{ diningBtnText }}</button>
      </div>
    </div>
  </div>

</div>
