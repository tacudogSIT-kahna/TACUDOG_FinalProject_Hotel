<div class="home-container">

  <!-- Section 1: Hotel Rooms Showcase Panel -->
  <div class="frosted-showcase-card">
    <img [src]="roomsImg" alt="Rooms Preview" class="showcase-icon-graphic">
    <h2 class="showcase-title-text">{{ roomsHeader }}</h2>
    <p class="showcase-description-text">{{ roomsDesc }}</p>
    <div class="action-wrapper">
      <button routerLink="/stay" class="showcase-btn">{{ roomsBtnText }}</button>
    </div>
  </div>

  <!-- Section 2: Restaurant & Bar Showcase Panel -->
  <div class="frosted-showcase-card">
    <img [src]="diningImg" alt="Dining Preview" class="showcase-icon-graphic contain-fit">
    <h2 class="showcase-title-text">{{ diningHeader }}</h2>
    <p class="showcase-description-text">{{ diningDesc }}</p>
    <!-- Appended active reservation button back under content text -->
    <div class="action-wrapper">
      <button class="showcase-btn">{{ diningBtnText }}</button>
    </div>
  </div>

</div>
