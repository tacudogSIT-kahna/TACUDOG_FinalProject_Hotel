<div class="home-container">
  
  <header class="hero-banner">
    <h1>{{ welcomeTitle }}</h1>
    <p>{{ mainIntro }}</p>
    <p class="sub-intro">{{ subIntro }}</p>
    
    <div class="booking-action-box">
      <button routerLink="/stay" class="checkin-btn">✨ Check-In Now & Explore Rooms</button>
    </div>
  </header>

  <section class="category-block">
    <div class="category-title">{{ menuTitle }}</div>
    <p class="section-intro-text">{{ menuIntro }}</p>
    
    <div class="food-row-grid">
      <div class="food-card" *ngFor="let food of foodItems">
        <div class="food-img-placeholder" [ngClass]="food.styleClass">
          {{ food.icon }}
        </div>
        <h3>{{ food.name }}</h3>
        <p>{{ food.desc }}</p>
        <span class="price-tag">💰 {{ food.price }} Gold Coins</span>
      </div>
    </div>
  </section>

</div>
