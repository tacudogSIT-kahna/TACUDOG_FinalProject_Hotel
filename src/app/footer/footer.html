<footer class="bottom-footer">
    <div class="footer-content">
      <p>© 2026 The Coolest Hotel in Ooo. All Rights Mathematical.</p>
      <div class="footer-links">
        <a (click)="openModal('privacy')">Privacy Policy</a>
        <a (click)="openModal('terms')">Terms of Service</a>
        <a (click)="openModal('contact')">Contact Us</a>
      </div>
    </div>
  </footer>
  
  <!-- Interactive Glassmorphic Pop-up Modal Window Overlay -->
  <div class="modal-overlay" *ngIf="isModalOpen">
    <div class="modal-box-frame">
      <header class="modal-header-row">
        <h2>{{ modalTitle }}</h2>
        <button class="close-modal-btn" (click)="closeModal()">×</button>
      </header>
      <div class="modal-body-content">
        <p>{{ modalContent }}</p>
      </div>
    </div>
  </div>
